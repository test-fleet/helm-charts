name: Publish Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  OCI_REPO: test-fleet/charts

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        chart: [control-server, test-runner]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/${{ matrix.chart }}

      - name: Read chart version
        id: chart
        run: |
          version=$(helm show chart charts/${{ matrix.chart }} | awk -F': *' '/^version:/ {print $2}')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} \
            --username ${{ github.actor }} --password-stdin

      - name: Skip if version already published
        id: check
        run: |
          if helm show chart oci://${{ env.REGISTRY }}/${{ env.OCI_REPO }}/${{ matrix.chart }} \
            --version ${{ steps.chart.outputs.version }} >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.chart }} ${{ steps.chart.outputs.version }} is already published — bump Chart.yaml's version to publish a new one."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Package chart
        if: steps.check.outputs.exists == 'false'
        run: helm package charts/${{ matrix.chart }} --destination .dist

      - name: Push chart
        if: steps.check.outputs.exists == 'false'
        run: |
          helm push .dist/${{ matrix.chart }}-${{ steps.chart.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OCI_REPO }}
