{{- if not .Values.runnerName }}
{{- fail "test-runner: `runnerName` is required — must match the name used when registering this runner (POST /runners/register)." }}
{{- end }}
{{- if not .Values.existingSecret }}
{{- fail "test-runner: `existingSecret` is required — create a Secret with this runner's API_KEY/API_SECRET and reference it here." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "test-runner.fullname" . }}
  labels:
    {{- include "test-runner.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "test-runner.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "test-runner.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: test-runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: RUNNER_NAME
              value: {{ .Values.runnerName | quote }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: {{ .Values.apiKeySecretKey | default "API_KEY" }}
            - name: API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret }}
                  key: {{ .Values.apiSecretSecretKey | default "API_SECRET" }}
          envFrom:
            - configMapRef:
                name: {{ include "test-runner.fullname" . }}
            {{- if .Values.sharedExistingSecret }}
            - secretRef:
                name: {{ .Values.sharedExistingSecret }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
