{{- if and (not .Values.existingSecret) (not .Values.secrets.create) }}
{{- fail "control-server: you must set either `existingSecret` (recommended) or `secrets.create=true` with `secrets.values` populated. See values.yaml for details." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "control-server.fullname" . }}
  labels:
    {{- include "control-server.labels" . | nindent 4 }}
spec:
  # Deliberately not configurable — see the note at the top of values.yaml.
  # The control server runs a cron scheduler and a startup bootstrap routine
  # that are not safe to run from more than one pod at a time.
  replicas: 1
  strategy:
    # Recreate (not RollingUpdate) so the old pod is fully torn down before
    # the new one starts — avoids two schedulers briefly overlapping during
    # a deploy.
    type: Recreate
  selector:
    matchLabels:
      {{- include "control-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "control-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "control-server.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: control-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "control-server.fullname" . }}
            - secretRef:
                name: {{ include "control-server.secretName" . }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
