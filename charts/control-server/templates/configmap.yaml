apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "control-server.fullname" . }}
  labels:
    {{- include "control-server.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{- if $value }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
  {{- if not .Values.config.SERVER_URL }}
  SERVER_URL: {{ printf "http://%s:%v" (include "control-server.fullname" .) .Values.service.port | quote }}
  {{- end }}
